<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>PayPlan</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
<style>
body{font-family:Inter,system-ui;background:#eef3f9;margin:0;-webkit-font-smoothing:antialiased}
.app{max-width:1100px;margin:auto;padding:18px 18px 110px}
.header{background:linear-gradient(135deg,#4a90e2,#6fb1ff);color:white;padding:24px;border-radius:24px;margin-bottom:18px;box-shadow:0 25px 50px rgba(0,0,0,.18)}
.grid-home,.grid-plan{display:grid;grid-template-columns:1fr 1fr;gap:24px;grid-auto-rows:minmax(210px,auto)}
.card{background:white;border-radius:22px;padding:18px;box-shadow:0 12px 28px rgba(0,0,0,.08);min-height:210px;display:flex;flex-direction:column;justify-content:center;position:relative;overflow:hidden}
.card::before{content:'';position:absolute;top:0;left:0;right:0;height:6px;background:#e6edf7}
.card.strip-blue::before{background:#4a90e2}
.card.strip-green::before{background:#1f8a4c}
.card.strip-red::before{background:#d64545}
.card.strip-purple::before{background:#7c5cff}
.card.clickable{cursor:pointer;transition:.15s ease}
.card.clickable:hover{transform:translateY(-2px)}
.card-title{font-weight:700;margin-bottom:8px}
.big{font-size:32px;font-weight:700;line-height:1.1}
.stat{font-size:13px;color:#666;margin-top:6px}
.status-pill{display:inline-block;padding:6px 12px;border-radius:999px;font-weight:600;font-size:12px;margin-top:10px}
.safe{background:#e6f6ec;color:#1f8a4c}
.risk{background:#ffeaea;color:#d64545}
.bottom-nav{position:fixed;bottom:16px;left:50%;transform:translateX(-50%);background:white;padding:12px 16px;border-radius:24px;display:flex;gap:20px;box-shadow:0 25px 50px rgba(0,0,0,.25);z-index:20}
.nav-btn{background:none;border:none;font-weight:600;color:#888;font-size:14px;cursor:pointer}
.nav-btn.active{color:#4a90e2}
.screen{display:none}.screen.active{display:block;animation:fade .2s}
@keyframes fade{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
input,select,textarea{width:100%;padding:13px;border-radius:14px;border:1px solid #e3e7ee;margin-bottom:12px;box-sizing:border-box;font:inherit}
button.primary{background:#4a90e2;color:white;border:none;padding:14px;border-radius:14px;font-weight:700;width:100%;cursor:pointer}
button.delete-btn{background:#ffdede;color:#b42318;border:none;border-radius:8px;padding:6px 10px;cursor:pointer;font-weight:600}
button.secondary{background:#eef3f9;color:#2b5fa8;border:none;padding:10px 12px;border-radius:10px;font-weight:600;cursor:pointer}
.plan-item,.txn-card,.suggestion-item{background:#f7f9fc;border-radius:16px;padding:14px;margin-bottom:12px;display:flex;justify-content:space-between;align-items:center;gap:12px}
.hint{font-size:12px;color:#666;line-height:1.4}
.file-input{padding:10px;background:#f7f9fc;border:1px dashed #c7d3e3;border-radius:14px;margin:12px 0 8px}
.badge{display:inline-block;padding:4px 10px;border-radius:999px;font-size:12px;font-weight:600}.badge.income{background:#e8f7ee;color:#1f8a4c}.badge.outgoing{background:#ffeaea;color:#d64545}
.modal{position:fixed;inset:0;background:rgba(0,0,0,.4);display:none;align-items:center;justify-content:center;padding:16px;z-index:30}.modal.open{display:flex}
.modal-inner{background:white;border-radius:20px;padding:20px;width:100%;max-width:640px;max-height:84vh;overflow:auto;box-shadow:0 25px 50px rgba(0,0,0,.25)}
.range-tabs{display:flex;gap:8px;margin:12px 0 14px;flex-wrap:wrap}.range-tab{background:#eef3f9;border:none;border-radius:999px;padding:8px 12px;font-weight:600;cursor:pointer;color:#2b5fa8}.range-tab.active{background:#4a90e2;color:white}
.insight{background:#f7f9fc;border-radius:16px;padding:14px;margin-top:10px}.mini-list{margin-top:8px}.mini-row{display:flex;justify-content:space-between;padding:8px 0;border-bottom:1px solid #eef1f5;font-size:14px}
canvas{width:100% !important;height:220px !important}
@media (max-width:720px){.app{max-width:420px;padding:16px 16px 110px}.grid-home,.grid-plan{grid-template-columns:1fr}canvas{height:170px !important}}
</style>
</head>
<body>
<div class="app">
  <div class="header">
    <div style="font-size:26px;font-weight:700">PayPlan</div>
    <div style="opacity:.9">Plan around payday</div>
  </div>

  <div id="home" class="screen active">
    <div class="grid-home">
      <div class="card clickable strip-blue" onclick="openHomeModal('today')">
        <div class="card-title">Today Status</div>
        <div id="todayStatus" class="big">—</div>
        <div id="todayBalanceLine" class="stat"></div>
        <div id="daysToPay" class="stat"></div>
        <div id="nextBill" class="stat"></div>
      </div>

      <div class="card clickable strip-red" onclick="openHomeModal('forecast')">
        <div class="card-title">Forecast Balance</div>
        <div id="lowestBalance" class="big">€0.00</div>
        <div id="statusPill"></div>
        <div id="forecastMeta" class="stat"></div>
      </div>

      <div class="card clickable strip-green" onclick="openHomeModal('graph')">
        <div class="card-title">Balance Graph</div>
        <canvas id="balanceChart"></canvas>
      </div>

      <div class="card clickable strip-purple" onclick="openHomeModal('upcoming')">
        <div style="display:flex;justify-content:space-between;align-items:center;gap:12px">
          <div class="card-title" style="margin:0">Upcoming</div>
          <div class="hint">Next 7 days</div>
        </div>
        <div id="upcomingPreview"></div>
      </div>
    </div>
  </div>

  <div id="plan" class="screen">
    <div class="grid-plan">
      <div class="card clickable strip-blue" onclick="openPlanModal('manual')">
        <div class="card-title">Manual Input</div>
        <div class="hint">Add a new income or bill manually.</div>
      </div>

      <div class="card clickable strip-purple" onclick="openPlanModal('upload')">
        <div class="card-title">Upload Statement</div>
        <div class="hint">Upload a real PDF or paste transactions and review recurring suggestions.</div>
        <div id="uploadSummary" class="stat"></div>
      </div>

      <div class="card clickable strip-green" onclick="openPlanModal('income')">
        <div class="card-title">Income</div>
        <div id="incomeSummary" class="hint"></div>
        <div id="incomePreview" class="mini-list"></div>
      </div>

      <div class="card clickable strip-red" onclick="openPlanModal('outgoing')">
        <div class="card-title">Outgoings</div>
        <div id="outgoingSummary" class="hint"></div>
        <div id="outgoingPreview" class="mini-list"></div>
      </div>
    </div>
  </div>

  <div id="settings" class="screen">
    <div class="card strip-blue">
      <div style="font-weight:700;margin-bottom:10px">Starting balance</div>
      <input id="startBal" type="number" placeholder="Enter current bank balance">
      <button class="primary" onclick="updateStart()">Save balance</button>
    </div>
  </div>
</div>

<div class="bottom-nav">
  <button class="nav-btn active" onclick="switchTab('home',this)">Home</button>
  <button class="nav-btn" onclick="switchTab('plan',this)">Plan</button>
  <button class="nav-btn" onclick="switchTab('settings',this)">Settings</button>
</div>

<div class="modal" id="editModal">
  <div class="modal-inner" style="max-width:420px">
    <h3 style="margin-top:0">Edit item</h3>
    <input id="editName">
    <select id="editType"><option>Outgoing</option><option>Income</option></select>
    <input id="editAmount" type="number">
    <select id="editFreq"><option>Monthly</option><option>Fortnightly</option><option>Weekly</option></select>
    <input id="editDate" type="date">
    <button class="primary" onclick="saveEdit()">Save</button>
    <button class="primary" style="background:#ff6b6b;margin-top:6px" onclick="deleteEdit()">Delete</button>
  </div>
</div>

<div class="modal" id="homeModal">
  <div class="modal-inner">
    <div style="display:flex;justify-content:space-between;align-items:center;gap:12px">
      <div id="homeModalTitle" style="font-weight:700;font-size:20px">Details</div>
      <button class="delete-btn" onclick="closeHomeModal()">Close</button>
    </div>
    <div id="homeModalContent" style="margin-top:14px"></div>
  </div>
</div>

<div class="modal" id="planModal">
  <div class="modal-inner">
    <div style="display:flex;justify-content:space-between;align-items:center;gap:12px">
      <div id="planModalTitle" style="font-weight:700;font-size:20px">Plan</div>
      <button class="delete-btn" onclick="closePlanModal()">Close</button>
    </div>
    <div id="planModalContent" style="margin-top:14px"></div>
  </div>
</div>

<script>
pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js'

let items = JSON.parse(localStorage.getItem('pp_items') || '[]')
let startBalance = Number(localStorage.getItem('pp_start') || 0)
let editingIndex = null
let chart = null
let upcomingForecastItems = []
let upcomingRange = 30
let recurringSuggestions = []
let detectedTransactions = []
let archivedTransactions = []
let homeSnapshot = { todayBal:0, lowest:0, nextPay:null, nextBill:null, upcoming:[], survivalEvents:0, labels:[], data:[] }

function save(){
  localStorage.setItem('pp_items', JSON.stringify(items))
  localStorage.setItem('pp_start', String(startBalance))
}

function switchTab(id, btn){
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'))
  document.getElementById(id).classList.add('active')
  document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'))
  btn.classList.add('active')
}

function updateStart(){
  startBalance = Number(document.getElementById('startBal').value || 0)
  save()
  renderHomeDashboard()
}

function formatDateDisplay(date){
  return date.toLocaleDateString('en-IE', { day:'2-digit', month:'2-digit', year:'numeric' })
}

function formatAmount(amount, type){
  return `${type === 'Income' ? '+' : '-'}€${Math.abs(amount).toFixed(2)}`
}

function monthlyValue(item){
  if(item.freq === 'Monthly') return item.amount
  if(item.freq === 'Fortnightly') return item.amount * 2.166
  if(item.freq === 'Weekly') return item.amount * 4.333
  return item.amount
}

function addItemFromModal(){
  const n = document.getElementById('modalName').value.trim()
  const t = document.getElementById('modalType').value
  const a = Number(document.getElementById('modalAmount').value || 0)
  const f = document.getElementById('modalFreq').value
  const d = document.getElementById('modalDate').value
  if(!n || !a || !d) return
  items.push({ name:n, type:t, amount:a, freq:f, date:d })
  save()
  closePlanModal()
  renderHomeDashboard()
  renderPlanDashboard()
}

function openEdit(index){
  editingIndex = index
  const item = items[index]
  document.getElementById('editName').value = item.name
  document.getElementById('editType').value = item.type
  document.getElementById('editAmount').value = item.amount
  document.getElementById('editFreq').value = item.freq
  document.getElementById('editDate').value = item.date
  document.getElementById('editModal').classList.add('open')
}

function saveEdit(){
  if(editingIndex === null) return
  items[editingIndex] = {
    name: document.getElementById('editName').value.trim(),
    type: document.getElementById('editType').value,
    amount: Number(document.getElementById('editAmount').value || 0),
    freq: document.getElementById('editFreq').value,
    date: document.getElementById('editDate').value
  }
  save()
  document.getElementById('editModal').classList.remove('open')
  renderHomeDashboard()
  renderPlanDashboard()
}

function deleteEdit(){
  if(editingIndex === null) return
  items.splice(editingIndex, 1)
  save()
  document.getElementById('editModal').classList.remove('open')
  renderHomeDashboard()
  renderPlanDashboard()
}

function buildForecast(){
  let bal = startBalance
  let todayBal = startBalance
  let lowest = startBalance
  let survivalEvents = 0
  let nextPay = null
  let nextBill = null
  const labels = []
  const data = []
  const future = []
  const upcoming = []
  const now = new Date()
  const horizon = new Date()
  horizon.setMonth(horizon.getMonth() + 12)

  items.forEach(item => {
    let d = new Date(item.date + 'T00:00:00')
    let safety = 0
    while(d <= horizon){
      future.push({ ...item, date: new Date(d) })
      if(item.freq === 'Monthly') d.setMonth(d.getMonth() + 1)
      else if(item.freq === 'Fortnightly') d.setDate(d.getDate() + 14)
      else if(item.freq === 'Weekly') d.setDate(d.getDate() + 7)
      else break
      safety++
      if(safety > 80) break
    }
  })

  future.sort((a,b) => a.date - b.date)
  upcomingForecastItems = future.filter(f => (f.date - now) >= 0)

  future.forEach(f => {
    if(f.date <= now) todayBal += f.type === 'Income' ? f.amount : -f.amount
    bal += f.type === 'Income' ? f.amount : -f.amount
    labels.push(f.date.toLocaleDateString('en-IE'))
    data.push(bal)
    if(bal < lowest) lowest = bal
    if(bal >= 0) survivalEvents++
    if(!nextPay && f.type === 'Income' && f.date > now) nextPay = f
    if(!nextBill && f.type === 'Outgoing' && f.date > now) nextBill = f
    const diffDays = (f.date - now) / 86400000
    if(diffDays >= 0 && diffDays <= 7) upcoming.push(f)
  })

  homeSnapshot = { todayBal, lowest, nextPay, nextBill, upcoming, survivalEvents, labels, data }
}

function renderHomeDashboard(){
  if(chart) chart.destroy()
  buildForecast()
  const now = new Date()

  document.getElementById('todayStatus').innerText = homeSnapshot.todayBal >= 0 ? 'You are good 👍' : 'Tight ⚠️'
  document.getElementById('todayBalanceLine').innerText = `Today balance €${homeSnapshot.todayBal.toFixed(2)}`
  document.getElementById('daysToPay').innerText = homeSnapshot.nextPay ? `${Math.ceil((homeSnapshot.nextPay.date - now)/86400000)} days until ${homeSnapshot.nextPay.name}` : 'No income ahead yet'
  document.getElementById('nextBill').innerText = homeSnapshot.nextBill ? `Next bill ${homeSnapshot.nextBill.name} (${formatDateDisplay(homeSnapshot.nextBill.date)})` : 'No outgoing ahead yet'
  document.getElementById('lowestBalance').innerText = `€${homeSnapshot.lowest.toFixed(2)}`
  document.getElementById('forecastMeta').innerText = homeSnapshot.survivalEvents ? `Forecast stays positive for ${homeSnapshot.survivalEvents} events` : 'May go negative'
  document.getElementById('statusPill').innerHTML = homeSnapshot.lowest < 0 ? `<span class="status-pill risk">Risk</span>` : `<span class="status-pill safe">Safe</span>`

  const preview = homeSnapshot.upcoming.slice(0,3)
  document.getElementById('upcomingPreview').innerHTML = preview.length ? preview.map(f => `<div class="txn-card"><div><div style="font-weight:600">${f.name}</div><div class="hint">${formatDateDisplay(f.date)}</div></div><div style="font-weight:700;color:${f.type === 'Income' ? '#1f8a4c' : '#d64545'}">${formatAmount(f.amount, f.type)}</div></div>`).join('') : '<div class="hint">Nothing due in the next 7 days</div>'

  chart = new Chart(document.getElementById('balanceChart'), {
    type: 'line',
    data: { labels: homeSnapshot.labels, datasets: [{ data: homeSnapshot.data, borderWidth: 3, tension: .4, pointRadius: 0, segment: { borderColor: ctx => ctx.p0.parsed.y < 0 || ctx.p1.parsed.y < 0 ? '#d64545' : '#1f8a4c' } }] },
    options: { plugins: { legend: { display: false } }, scales: { x: { display: false }, y: { display: false } } }
  })
}

function renderPlanDashboard(){
  const incomes = items.filter(x => x.type === 'Income')
  const outgoings = items.filter(x => x.type === 'Outgoing')
  const incomeTotal = incomes.reduce((t,x) => t + monthlyValue(x), 0)
  const outgoingTotal = outgoings.reduce((t,x) => t + monthlyValue(x), 0)

  document.getElementById('incomeSummary').textContent = incomes.length ? `€${incomeTotal.toFixed(0)} per month from ${incomes.length} incomes` : 'No income items yet'
  document.getElementById('outgoingSummary').textContent = outgoings.length ? `€${outgoingTotal.toFixed(0)} per month across ${outgoings.length} bills` : 'No outgoing items yet'
  document.getElementById('uploadSummary').textContent = recurringSuggestions.length ? `${recurringSuggestions.length} suggestions ready to review` : detectedTransactions.length ? `${detectedTransactions.length} other transactions detected` : 'No document scanned yet'
  document.getElementById('incomePreview').innerHTML = incomes.slice(0,2).map(x => `<div class="mini-row"><span>${x.name}</span><span>€${x.amount}</span></div>`).join('') || '<div class="hint">Nothing added yet</div>'
  document.getElementById('outgoingPreview').innerHTML = outgoings.slice(0,2).map(x => `<div class="mini-row"><span>${x.name}</span><span>€${x.amount}</span></div>`).join('') || '<div class="hint">Nothing added yet</div>'
}

function openHomeModal(type){
  const title = document.getElementById('homeModalTitle')
  const content = document.getElementById('homeModalContent')
  const now = new Date()
  if(type === 'today'){
    title.textContent = 'Today Status'
    content.innerHTML = `<div class="insight"><div class="card-title">Today balance</div><div class="big">€${homeSnapshot.todayBal.toFixed(2)}</div></div><div class="insight">${homeSnapshot.todayBal >= 0 ? 'You are currently in a safe position.' : 'You are currently under pressure.'}</div><div class="insight">${homeSnapshot.nextPay ? `${Math.ceil((homeSnapshot.nextPay.date - now)/86400000)} days until ${homeSnapshot.nextPay.name}.` : 'No future income detected yet.'}</div><div class="insight">${homeSnapshot.nextBill ? `Next bill: ${homeSnapshot.nextBill.name} on ${formatDateDisplay(homeSnapshot.nextBill.date)}.` : 'No future outgoing detected yet.'}</div>`
  } else if(type === 'forecast'){
    title.textContent = 'Forecast Balance'
    content.innerHTML = `<div class="insight"><div class="card-title">Lowest point</div><div class="big">€${homeSnapshot.lowest.toFixed(2)}</div></div><div class="insight">${homeSnapshot.lowest < 0 ? 'Your forecast drops below zero at some point in the forecast period.' : 'Your forecast stays above zero in the current period.'}</div><div class="insight">Forecast stays positive for ${homeSnapshot.survivalEvents} forecast events.</div>`
  } else if(type === 'graph'){
    title.textContent = 'Balance Graph'
    content.innerHTML = '<canvas id="modalChart" height="260"></canvas>'
    setTimeout(() => {
      new Chart(document.getElementById('modalChart'), { type: 'line', data: { labels: homeSnapshot.labels, datasets: [{ data: homeSnapshot.data, borderWidth: 3, tension: .35, pointRadius: 0, segment: { borderColor: ctx => ctx.p0.parsed.y < 0 || ctx.p1.parsed.y < 0 ? '#d64545' : '#1f8a4c' } }] }, options: { plugins: { legend: { display: false } }, scales: { x: { display: false } } } })
    }, 0)
  } else if(type === 'upcoming'){
    title.textContent = 'Upcoming Forecast'
    content.innerHTML = `<div id="upcomingTabs"></div><div id="upcomingModalList"></div>`
    setTimeout(renderUpcomingModal, 0)
  }
  document.getElementById('homeModal').classList.add('open')
}

function closeHomeModal(){ document.getElementById('homeModal').classList.remove('open') }
function setUpcomingRange(days){ upcomingRange = days; renderUpcomingModal() }

function renderUpcomingModal(){
  const listEl = document.getElementById('upcomingModalList')
  const tabsEl = document.getElementById('upcomingTabs')
  if(!listEl || !tabsEl) return

  const ranges = [
    { days: 7, label: '7 days' },
    { days: 30, label: '30 days' },
    { days: 90, label: '3 months' },
    { days: 365, label: '12 months' }
  ]

  tabsEl.innerHTML = `<div class="range-tabs">${ranges.map(r => `<button class="range-tab ${upcomingRange === r.days ? 'active' : ''}" onclick="setUpcomingRange(${r.days})">${r.label}</button>`).join('')}</div>`

  const now = new Date()
  const filtered = upcomingForecastItems.filter(f => { const diff = (f.date - now) / 86400000; return diff >= 0 && diff <= upcomingRange })
  listEl.innerHTML = filtered.length ? filtered.map(f => `<div class="txn-card"><div><div style="font-weight:600">${f.name}</div><div class="hint">${formatDateDisplay(f.date)} • ${f.type}</div></div><div style="font-weight:700;color:${f.type === 'Income' ? '#1f8a4c' : '#d64545'}">${formatAmount(f.amount, f.type)}</div></div>`).join('') : '<div class="hint">Nothing in this period</div>'
}

function normalizeMerchantName(name){ return String(name || '').toUpperCase().split(' ').filter(Boolean).join(' ') }

function inferFrequency(dates){
  if(dates.length < 2) return null
  const sorted = [...dates].sort((a,b) => a - b)
  const gaps = []
  for(let i = 1; i < sorted.length; i++) gaps.push(Math.round((sorted[i] - sorted[i-1]) / 86400000))
  const avg = gaps.reduce((a,b) => a + b, 0) / gaps.length
  if(avg >= 5 && avg <= 9) return 'Weekly'
  if(avg >= 12 && avg <= 16) return 'Fortnightly'
  if(avg >= 26 && avg <= 35) return 'Monthly'
  return null
}

function parsePastedTransactions(text){
  const lines = String(text || '').split('\n').map(x => x.trim()).filter(Boolean)
  return lines.map(line => {
    const parts = line.split(',').map(x => x.trim())
    if(parts.length < 4) return null
    const date = new Date(parts[0] + 'T00:00:00')
    const name = parts[1]
    const amount = Number(String(parts[2]).replace('€','').trim())
    const type = parts[3].toLowerCase().includes('income') ? 'Income' : 'Outgoing'
    if(!name || Number.isNaN(date.getTime()) || Number.isNaN(amount)) return null
    return { date, name, amount: Math.abs(amount), type }
  }).filter(Boolean)
}

function extractTransactionsFromRawText(rawText){
  const lines = String(rawText || '')
    .split('\n')
    .map(l => l.trim())
    .filter(Boolean)

  const dateRegex = /^\d{2}\s+[A-Za-z]{3}\s+\d{4}$/
  const amountRegex = /^\d+[.,]\d{2}$/
  const ignoreExact = new Set(['BALANCE FORWARD','Bank of Ireland'])

  const transactions = []
  let currentDate = null

  function parseDateLine(line){
    const monthMap = {Jan:'01', Feb:'02', Mar:'03', Apr:'04', May:'05', Jun:'06', Jul:'07', Aug:'08', Sep:'09', Oct:'10', Nov:'11', Dec:'12'}
    const m = line.match(/^(\d{2})\s+([A-Za-z]{3})\s+(\d{4})$/)
    if(!m) return null
    const day = m[1]
    const month = monthMap[m[2]]
    const year = m[3]
    if(!month) return null
    return `${year}-${month}-${day}`
  }

  function classifyType(name){
    return /salary|sent from revolut|lodgement|credit|refund|\bsp\b|transfer from|received/i.test(name)
      ? 'Income'
      : 'Outgoing'
  }

  for(let i = 0; i < lines.length; i++){
    const line = lines[i]

    if(dateRegex.test(line)){
      currentDate = parseDateLine(line)
      continue
    }

    if(!currentDate) continue
    if(ignoreExact.has(line)) continue
    if(/^Page\s+\d+/i.test(line)) continue
    if(amountRegex.test(line)) continue

    const description = line
    const next = lines[i + 1]
    const afterNext = lines[i + 2]

    if(next && amountRegex.test(next)){
      const amount = Number(next.replace(',', '.'))
      const hasRunningBalanceAfter = afterNext && amountRegex.test(afterNext)

      transactions.push({
        date: new Date(currentDate + 'T00:00:00'),
        name: description,
        amount: Math.abs(amount),
        type: classifyType(description)
      })

      i += hasRunningBalanceAfter ? 2 : 1
    }
  }

  return transactions
}

async function runPdfRecurringDetection(){
  const input = document.getElementById('statementFile')
  const status = document.getElementById('uploadStatus')
  const pasteArea = document.getElementById('statementPaste')

  if(!input || !input.files || !input.files[0]){
    if(status) status.textContent = 'Choose a PDF first'
    return
  }

  if(status) status.textContent = 'Reading PDF…'

  try {
    const file = input.files[0]
    const buffer = await file.arrayBuffer()
    const pdf = await pdfjsLib.getDocument({ data: buffer }).promise

    let rawText = ''

    for(let pageNum = 1; pageNum <= pdf.numPages; pageNum++){
      const page = await pdf.getPage(pageNum)
      const content = await page.getTextContent()

      const pageLines = content.items
        .map(i => String(i.str || '').trim())
        .filter(Boolean)

      rawText += pageLines.join('\n') + '\n'
    }

    if(pasteArea) pasteArea.value = rawText.trim()

    const extracted = extractTransactionsFromRawText(rawText)

    detectRecurringFromImported(extracted)
    renderUploadReview()
    renderPlanDashboard()

    if(status){
      status.textContent = extracted.length
        ? `Read ${extracted.length} transactions from PDF.`
        : 'No transactions found in PDF.'
    }
  } catch(err){
    console.error(err)
    if(status) status.textContent = 'Could not read that PDF.'
  }
}

function detectRecurringFromImported(transactions){
  const groups = {}
  transactions.forEach(t => {
    const key = `${normalizeMerchantName(t.name)}|${t.type}|${t.amount.toFixed(2)}`
    if(!groups[key]) groups[key] = []
    groups[key].push(t)
  })
  recurringSuggestions = []
  detectedTransactions = []
  Object.keys(groups).forEach(key => {
    const group = groups[key].sort((a,b) => a.date - b.date)
    const freq = inferFrequency(group.map(g => g.date))
    if(group.length >= 2 && freq){
      recurringSuggestions.push({ name:group[0].name, type:group[0].type, amount:group[0].amount, freq:freq, count:group.length, date:group[0].date.toISOString().slice(0,10), selected:true })
    } else {
      detectedTransactions.push(...group)
    }
  })
}

}

function toggleSuggestion(index){ recurringSuggestions[index].selected = !recurringSuggestions[index].selected; renderUploadReview() }
function addSelectedSuggestions(){ recurringSuggestions.filter(s => s.selected).forEach(s => items.push({ name:s.name, type:s.type, amount:s.amount, freq:s.freq, date:s.date })); recurringSuggestions = recurringSuggestions.filter(s => !s.selected); save(); renderHomeDashboard(); renderPlanDashboard(); renderUploadReview() }
function archiveDetected(index){ archivedTransactions.push(detectedTransactions[index]); detectedTransactions.splice(index, 1); renderUploadReview() }

function renderUploadReview(){
  const box = document.getElementById('uploadReview')
  if(!box) return
  box.innerHTML = `<div class="insight" style="margin:0"><div style="font-weight:700">Recurring suggestions</div><div class="hint" style="margin:8px 0 12px">Review what PayPlan thinks is weekly, fortnightly or monthly. Nothing is added unless you confirm it.</div>${recurringSuggestions.length ? recurringSuggestions.map((s,i) => `<div class="suggestion-item"><div><div style="font-weight:600">${s.name}</div><div class="hint">${s.freq} • ${s.count} matches • from ${s.date}</div></div><div style="text-align:right"><div class="badge ${s.type === 'Income' ? 'income' : 'outgoing'}">${s.type}</div><div style="font-weight:700;margin-top:6px">€${s.amount.toFixed(2)}</div><button class="secondary" style="margin-top:8px" onclick="toggleSuggestion(${i})">${s.selected ? 'Selected' : 'Select'}</button></div></div>`).join('') : '<div class="hint">No recurring suggestions yet.</div>'}${recurringSuggestions.length ? '<button class="primary" style="margin-top:10px" onclick="addSelectedSuggestions()">Add selected</button>' : ''}</div><div class="insight"><div style="font-weight:700">Other transactions</div><div class="hint" style="margin:8px 0 12px">These stay as single transactions for now. You can archive them to keep this list tidy.</div>${detectedTransactions.length ? detectedTransactions.slice(0,12).map((t,i) => `<div class="plan-item"><div><div style="font-weight:600">${t.name}</div><div class="hint">${formatDateDisplay(t.date)} • ${t.type}</div></div><div style="text-align:right"><div style="font-weight:700">€${t.amount.toFixed(2)}</div><button class="secondary" style="margin-top:8px" onclick="archiveDetected(${i})">Archive</button></div></div>`).join('') : '<div class="hint">No one-off transactions detected.</div>'}${archivedTransactions.length ? `<div class="hint" style="margin-top:10px">${archivedTransactions.length} archived</div>` : ''}</div>`
}

  const outgoings = items.filter(x => x.type === 'Outgoing')

    title.textContent = 'Manual Input'
    content.innerHTML = `<div class="grid-plan" style="grid-template-columns:1.1fr .9fr;gap:16px"><div class="insight" style="margin:0"><div style="font-weight:700;margin-bottom:12px">Add new item</div><input id="modalName" placeholder="Name"><select id="modalType"><option>Outgoing</option><option>Income</option></select><input id="modalAmount" type="number" placeholder="Amount"><select id="modalFreq"><option>Monthly</option><option>Fortnightly</option><option>Weekly</option></select><input id="modalDate" type="date"><button class="primary" onclick="addItemFromModal()">Add</button></div><div><div class="insight" style="margin:0"><div style="font-weight:700">Quick help</div><div class="hint" style="margin-top:8px">Use this to add salary, mortgage, rent, subscriptions, phone bills and anything else you already know.</div><div class="hint" style="margin-top:10px">This is the fastest way to build your starting plan before statement import is added.</div></div></div></div>`
  } else if(type === 'upload'){
    title.textContent = 'Upload Statement'
    content.innerHTML = `<div class="grid-plan" style="grid-template-columns:1fr;gap:16px"><div class="insight" style="margin:0"><div style="font-weight:700;margin-bottom:10px">Recurring transaction detection</div><div class="hint">Upload a Bank of Ireland PDF statement or paste transactions manually. Manual format: <strong>YYYY-MM-DD, Name, Amount, Type</strong>.</div><input id="statementFile" class="file-input" type="file" accept="application/pdf"><div id="uploadStatus" class="hint" style="margin-top:4px"></div><textarea id="statementPaste" placeholder="2026-03-01, Salary, 547.25, Income&#10;2026-03-05, Mortgage, 1107.42, Outgoing" style="min-height:150px;margin:12px 0"></textarea><div style="display:flex;gap:10px;flex-wrap:wrap"><button class="secondary" onclick="loadDemoTransactions()">Load demo</button><button class="secondary" onclick="runPdfRecurringDetection()">Detect from PDF</button><button class="primary" style="width:auto;padding:12px 18px" onclick="runRecurringDetection()">Detect from pasted list</button></div></div><div id="uploadReview"></div></div>`
    setTimeout(renderUploadReview, 0)
  } else if(type === 'income'){
    const total = incomes.reduce((t,x) => t + monthlyValue(x), 0)
    title.textContent = 'Income'
    content.innerHTML = `<div class="grid-plan" style="grid-template-columns:.9fr 1.1fr;gap:16px"><div><div class="insight" style="margin:0"><div class="card-title">Monthly income</div><div class="big">€${total.toFixed(0)}</div><div class="stat">${incomes.length} income items saved</div></div><div class="insight"><div class="card-title">Types</div><div class="mini-row"><span>Weekly</span><span>${incomes.filter(x=>x.freq==='Weekly').length}</span></div><div class="mini-row"><span>Fortnightly</span><span>${incomes.filter(x=>x.freq==='Fortnightly').length}</span></div><div class="mini-row"><span>Monthly</span><span>${incomes.filter(x=>x.freq==='Monthly').length}</span></div></div></div><div><div class="card-title" style="margin-bottom:12px">Saved income</div>${incomes.length ? incomes.map(x => `<div class="plan-item" onclick="closePlanModal();openEdit(${items.indexOf(x)})"><div><div style="font-weight:600">${x.name}</div><div class="hint">${x.freq} • ${x.date}</div></div><div>€${x.amount}</div></div>`).join('') : '<div class="hint">No income items yet</div>'}</div></div>`
  } else if(type === 'outgoing'){
    const total = outgoings.reduce((t,x) => t + monthlyValue(x), 0)
    title.textContent = 'Outgoings'
    content.innerHTML = `<div class="grid-plan" style="grid-template-columns:.9fr 1.1fr;gap:16px"><div><div class="insight" style="margin:0"><div class="card-title">Monthly outgoings</div><div class="big">€${total.toFixed(0)}</div><div class="stat">${outgoings.length} outgoing items saved</div></div><div class="insight"><div class="card-title">Simple groups</div><div class="mini-row"><span>Housing / Bills</span><span>${outgoings.filter(x => /mortgage|rent|bill|sepa dd/i.test(x.name)).length}</span></div><div class="mini-row"><span>Utilities</span><span>${outgoings.filter(x => /electric|gas|virgin|sky|phone|eir|vodafone/i.test(x.name)).length}</span></div><div class="mini-row"><span>Other</span><span>${outgoings.filter(x => !/mortgage|rent|bill|sepa dd|electric|gas|virgin|sky|phone|eir|vodafone/i.test(x.name)).length}</span></div></div></div><div><div class="card-title" style="margin-bottom:12px">Saved outgoings</div>${outgoings.length ? outgoings.map(x => `<div class="plan-item" onclick="closePlanModal();openEdit(${items.indexOf(x)})"><div><div style="font-weight:600">${x.name}</div><div class="hint">${x.freq} • ${x.date}</div></div><div>€${x.amount}</div></div>`).join('') : '<div class="hint">No outgoing items yet</div>'}</div></div>`

  document.getElementById('planModal').classList.add('open')

function closePlanModal(){ document.getElementById('planModal').classList.remove('open') }
